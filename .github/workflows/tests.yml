name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Lint with pylint
      run: |
        pip install pylint
        pylint strategy/ utils/ --disable=all --enable=E,F
      continue-on-error: true
    
    - name: Run tests
      run: |
        pytest test/ -v --cov=strategy --cov=utils --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint flake8 black isort
    
    - name: Check code formatting with black
      run: black --check strategy/ utils/ test/
      continue-on-error: true
    
    - name: Check import sorting with isort
      run: isort --check-only strategy/ utils/ test/
      continue-on-error: true
    
    - name: Lint with flake8
      run: flake8 strategy/ utils/ test/ --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety
    
    - name: Check for security issues with bandit
      run: bandit -r strategy/ utils/ web_server.py -f json -o bandit-report.json
      continue-on-error: true
    
    - name: Check dependencies for known vulnerabilities
      run: safety check --json
      continue-on-error: true
