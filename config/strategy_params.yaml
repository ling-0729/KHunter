      long_ma_period:
        default: 30
        description: 长期均线周期
        display_name: 长期均线
        group: 趋势参数
        max: 60
        min: 10
        type: int
      min_gap:
        default: 10
        description: 相邻局部高点的最小间隔交易日数
        display_name: 最小间隔
        group: 形态参数
        max: 20
        min: 5
        type: int
      min_pattern_days:
        default: 10
