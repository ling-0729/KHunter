strategies:
  B1PatternMatch:
    color: '#06b6d4'
    description: B1形态的历史相似度匹配
    display_name: B1形态匹配
    icon: 📊
    param_details:
      lookback_days:
        default: 25
        description: 向前回看的交易日数
        display_name: 回看天数
        group: 匹配参数
        max: 60
        min: 10
        type: int
      min_similarity:
        default: 60.0
        description: 形态相似度的最小阈值(0-100)
        display_name: 最小相似度
        group: 匹配参数
        max: 100.0
        min: 30.0
        type: float
      top_n_results:
        default: 15
        description: 显示Top N个匹配结果
        display_name: 结果数量
        group: 匹配参数
        max: 50
        min: 5
        type: int
    param_groups:
    - description: 控制形态匹配的参数
      name: 匹配参数
    params:
      lookback_days: 25
      min_similarity: 60.0
      tolerances:
        drawdown: 15
        j_value: 30
        price_bias: 10
        trend_ratio: 0.1
        trend_spread: 10
      top_n_results: 15
      weights:
        kdj_state: 0.2
        price_shape: 0.25
        trend_structure: 0.3
        volume_pattern: 0.25
  BottomTrendInflectionStrategy:
    color: '#10b981'
    description: 识别股票在深度下跌后出现反转的拐点，通过深度下跌、MACD底背离和放量反弹三个条件的组合判断
    display_name: 底部趋势拐点
    icon: 📈
    param_details:
      decline_threshold:
        default: 0.45
        description: 下跌幅度阈值，从半年内最高点计算，下跌幅度超过此值才符合条件
        display_name: 下跌幅度(%)
        group: 下跌条件
        max: 0.8
        min: 0.2
        type: float
      lookback_days:
        default: 120
        description: 回溯天数（半年交易日），用于计算最高点和检测底背离
        display_name: 回溯天数
        group: 时间参数
        max: 240
        min: 60
        type: int
      macd_divergence_days:
        default: 20
        description: MACD底背离判断的时间窗口，在此天数内寻找最低点进行底背离判断
        display_name: 底背离时间窗口
        group: 背离条件
        max: 60
        min: 5
        type: int
      price_increase_threshold:
        default: 0.08
        description: 涨幅阈值，当日涨幅超过此值或涨停时符合放量反弹条件
        display_name: 涨幅阈值(%)
        group: 反弹条件
        max: 0.3
        min: 0.05
        type: float
      volume_ma_period:
        default: 10
        description: 成交量均值计算周期，用于计算成交量倍数
        display_name: 成交量周期
        group: 成交量条件
        max: 20
        min: 5
        type: int
      volume_ratio_threshold:
        default: 2.5
        description: 成交量倍数阈值，当日成交量是前十日成交量均值的此倍数以上时符合条件
        display_name: 成交量倍数
        group: 成交量条件
        max: 10.0
        min: 1.5
        type: float
    param_groups:
    - description: 控制回溯时间范围的参数
      name: 时间参数
    - description: 控制深度下跌判断的参数
      name: 下跌条件
    - description: 控制MACD底背离判断的参数
      name: 背离条件
    - description: 控制放量反弹判断的参数
      name: 反弹条件
    - description: 控制成交量条件的参数
      name: 成交量条件
    params:
      decline_threshold: 0.45
      lookback_days: 120
      macd_divergence_days: 20
      price_increase_threshold: 0.08
      volume_ma_period: 10
      volume_ratio_threshold: 2.5
  BowlReboundStrategy:
    color: '#8b5cf6'
    description: 知行趋势线与多空线的碗口反弹形态
    display_name: 碗口反弹策略
    icon: 🍲
    param_details:
      CAP:
        default: 40
        description: 总市值大于此值(单位:亿元)
        display_name: 总市值(亿)
        group: 阈值参数
        max: 500
        min: 10
        type: int
      J_VAL:
        default: 30
        description: J值低于此值认为超卖
        display_name: J值上限
        group: 阈值参数
        max: 100
        min: 0
        type: int
      M:
        default: 1
        description: 在M天内存在关键K线（设置为1时只检查当天，设置为15时检查15天内的异动）
        display_name: 回溯天数
        group: 时间参数
        max: 60
        min: 1
        type: int
      M1:
        default: 14
        description: 多空线计算的第一个均线周期
        display_name: 均线周期1
        group: 均线参数
        max: 30
        min: 5
        type: int
      M2:
        default: 28
        description: 多空线计算的第二个均线周期
        display_name: 均线周期2
        group: 均线参数
        max: 60
        min: 10
        type: int
      M3:
        default: 57
        description: 多空线计算的第三个均线周期
        display_name: 均线周期3
        group: 均线参数
        max: 120
        min: 20
        type: int
      M4:
        default: 114
        description: 多空线计算的第四个均线周期
        display_name: 均线周期4
        group: 均线参数
        max: 240
        min: 40
        type: int
      N:
        default: 4
        description: 成交量是前一天的N倍以上
        display_name: 成交量倍数
        group: 阈值参数
        max: 10
        min: 1
        type: int
      duokong_pct:
        default: 3
        description: 距离多空线的百分比范围
        display_name: 多空线偏离(%)
        group: 阈值参数
        max: 10
        min: 1
        type: float
      short_pct:
        default: 2
        description: 距离短期趋势线的百分比范围
        display_name: 趋势线偏离(%)
        group: 阈值参数
        max: 10
        min: 1
        type: float
    param_groups:
    - description: 控制回溯时间范围的参数
      name: 时间参数
    - description: 控制信号强度的参数
      name: 阈值参数
    - description: 控制多空线计算的参数
      name: 均线参数
    params:
      CAP: 40
      J_VAL: 30
      M: 5
      M1: 14
      M2: 28
      M3: 57
      M4: 114
      N: 3
      duokong_pct: 3
      short_pct: 2
  MTopStrategy:
    color: '#f97316'
    description: 识别M头双顶反转形态，结合颈线跌破、趋势反转和量价配合确认卖出信号
    display_name: M头策略
    icon: 📊
