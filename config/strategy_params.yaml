        display_name: 跌破比例
        group: 突破参数
        max: 1.0
        min: 0.95
        type: float
      pattern_days:
        default: 40
        description: M头形态扫描的回溯天数
        display_name: 形态扫描天数
        group: 形态参数
        max: 80
        min: 20
        type: int
      resistance_ratio:
        default: 0.02
        description: 颈线压力位容忍比例
        display_name: 压力容忍(%)
        group: 过滤参数
        max: 0.05
        min: 0.01
        type: float
      short_ma_period:
        default: 10
        description: 短期均线周期
        display_name: 短期均线
        group: 趋势参数
        max: 20
        min: 5
        type: int
      support_days:
        default: 3
        description: 跌破后支撑验证天数
        display_name: 支撑天数
        group: 过滤参数
        max: 10
        min: 1
        type: int
      top_diff_threshold:
        default: 0.03
        description: H1和H2价格差异的最大百分比
        display_name: 顶部差异(%)
        group: 形态参数
        max: 0.1
        min: 0.01
        type: float
      volume_expand_ratio:
        default: 1.2
        description: 颈线跌破时成交量需达到均量的倍数
        display_name: 跌破放量倍数
        group: 成交量参数
        max: 3.0
        min: 1.0
        type: float
      volume_ma_period:
        default: 5
        description: 成交量均线计算周期
        display_name: 成交量周期
        group: 成交量参数
        max: 10
        min: 3
        type: int
      volume_shrink_ratio:
        default: 0.8
        description: 右侧顶部缩量判定比例
        display_name: 缩量比例
        group: 成交量参数
        max: 1.0
        min: 0.5
        type: float
    param_groups:
    - description: 控制M头形态识别的参数
      name: 形态参数
    - description: 控制颈线跌破判断的参数
      name: 突破参数
    - description: 控制成交量条件的参数
      name: 成交量参数
    - description: 控制趋势反转判断的参数
      name: 趋势参数
    - description: 控制假M头过滤的参数
      name: 过滤参数
    params:
      high_window: 5
      long_ma_period: 30
      min_gap: 10
      min_pattern_days: 10
      neckline_break_ratio: 0.99
      pattern_days: 40
      resistance_ratio: 0.02
      short_ma_period: 10
      support_days: 3
      top_diff_threshold: 0.03
      volume_expand_ratio: 1.2
      volume_ma_period: 5
      volume_shrink_ratio: 0.8
